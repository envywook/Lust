name: Android CI and Release

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - 'README.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager 'platforms;android-34' 'build-tools;34.0.0'

      - name: Prepare verified native dependencies
        run: ./scripts/prepare-native-deps.sh

      - name: Test and build APK
        run: ./gradlew --no-daemon testDebugUnitTest assembleDebug --stacktrace

      - name: Stage APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/Lust-${GITHUB_REF_NAME}-debug.apk
          (cd dist && sha256sum *.apk | tee SHA256SUMS.txt)

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lust-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub pre-release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Lust ${GITHUB_REF_NAME}" \
            --generate-notes \
            --prerelease \
            --verify-tag
